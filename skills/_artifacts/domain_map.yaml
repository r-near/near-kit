    slug: 'client-setup'
    domain: 'client-setup'
    description: 'Initialize the Near client with network presets, private keys, keystores, wallets, custom signers, or sandbox instances'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'Near class constructor'
      - 'NearConfig type'
      - 'Network presets (mainnet, testnet, localnet)'
      - 'Custom RPC URLs'
