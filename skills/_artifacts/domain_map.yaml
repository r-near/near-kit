  - name: 'Meta-Transactions'
    slug: 'meta-transactions'
    description: 'NEP-366 delegate actions for gasless transactions — user signs off-chain, relayer pays gas and submits'
    domain: 'authentication'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'TransactionBuilder.delegate()'
      - 'SignedDelegateAction'
      - 'decodeSignedDelegateAction() / encodeSignedDelegateAction()'
      - 'TransactionBuilder.signedDelegateAction()'
      - 'Payload format (base64)'
    tasks:
      - 'Create a delegate action on the client side'
      - 'Decode and validate a delegate action on the relayer'
      - 'Submit a delegate action as a relayer'
      - 'Implement relayer security checks'
    failure_modes:
      - mistake: 'Relayer not whitelisting receiver contracts'
        mechanism: 'A relayer that does not validate receiverId before submitting pays for any contract call the user signs, including malicious contracts. This is the primary security risk of running a relayer.'
        wrong_pattern: |
          const userAction = decodeSignedDelegateAction(payload)
          await relayerNear.transaction("relayer.near").signedDelegateAction(userAction).send()
        correct_pattern: |
          const userAction = decodeSignedDelegateAction(payload)
          if (userAction.delegateAction.receiverId !== "game.near") {
            return res.status(400).send("Invalid target contract")
          }
          await relayerNear.transaction("relayer.near").signedDelegateAction(userAction).send()
        source: 'docs/in-depth/meta-transactions.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Always — security-critical for relayers'
        skills: ['meta-transactions']
      - mistake: 'Not whitelisting method names on relayer'
        mechanism: 'Even with receiverId whitelisting, users could sign calls to unrestricted methods (e.g., "withdraw" instead of "move"). Relayers should also validate method names in the delegate action.'
        wrong_pattern: |
          if (userAction.delegateAction.receiverId !== "game.near") { /* ok */ }
        correct_pattern: |
          const innerAction = userAction.delegateAction
          if (innerAction.receiverId !== "game.near") return res.status(400).send("Invalid target")
          const methods = innerAction.actions.map(a => a.FunctionCall?.methodName).filter(Boolean)
          if (!methods.every(m => ["move", "attack"].includes(m))) return res.status(400).send("Invalid method")
        source: 'docs/in-depth/meta-transactions.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — security best practice'
        skills: ['meta-transactions']
      - mistake: 'Confusing delegate() return value as a transaction result'
        mechanism: 'delegate() returns { signedDelegateAction, payload } — it does NOT submit anything to the network. It is purely local signing. Agents may treat the return value like a transaction outcome.'
        wrong_pattern: |
          const result = await near.transaction("user.near").functionCall(...).delegate()
          console.log(result.transaction.hash) // Error: no transaction property
        correct_pattern: |
          const { signedDelegateAction, payload } = await near.transaction("user.near").functionCall(...).delegate()
          // Send payload to relayer
        source: 'packages/near-kit/src/core/transaction.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always'
        skills: ['meta-transactions']

  - name: 'Message Signing'
    slug: 'message-signing'
    description: 'NEP-413 off-chain message signing for gasless authentication — sign messages, verify signatures, prevent replay attacks'
    domain: 'authentication'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'near.signMessage()'
      - 'verifyNep413Signature()'
      - 'generateNonce()'
      - 'SignedMessage type'
      - 'fullAccessKeyExists()'
    tasks:
      - 'Sign an authentication message on the client'
      - 'Verify a signature on the server'
      - 'Generate nonces for replay protection'
      - 'Check nonce expiration'
    failure_modes:
      - mistake: 'Not storing nonces for replay attack prevention'
        mechanism: 'Cryptographic verification alone is insufficient. Without storing used nonces in a database, an attacker who intercepts a signed message can replay it to authenticate as the user again.'
        wrong_pattern: |
          const isValid = await verifyNep413Signature(signedMessage, params, { near })
          if (isValid) { /* authenticate */ }
        correct_pattern: |
          const isValid = await verifyNep413Signature(signedMessage, params, { near })
          if (!isValid) return res.status(401).send("Invalid")
          if (await db.nonceExists(nonce)) return res.status(401).send("Replay")
          await db.storeNonce(nonce)
        source: 'docs/in-depth/message-signing.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Always — security-critical'
        skills: ['message-signing']
      - mistake: 'Not hex-encoding nonce for JSON transport'
        mechanism: 'generateNonce() returns a Uint8Array. To send it via JSON, it must be hex-encoded. Sending the raw Uint8Array will serialize incorrectly.'
        wrong_pattern: |
          body: JSON.stringify({ nonce }) // Uint8Array serializes as object
        correct_pattern: |
          import { hex } from "@scure/base"
          body: JSON.stringify({ nonce: hex.encode(nonce) })
        source: 'docs/in-depth/message-signing.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['message-signing']

  - name: 'Error Handling'
    slug: 'error-handling'
    description: 'Catch and handle typed error classes with instanceof checks — covering transaction failures, network issues, and contract execution errors'
    domain: 'errors'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'NearError base class'
      - 'FunctionCallError (panic, logs)'
      - 'InsufficientBalanceError (required, available)'
      - 'InvalidNonceError (retryable)'
      - 'NetworkError (retryable, statusCode)'
      - 'AccountDoesNotExistError (accountId)'
      - 'GasLimitExceededError'
      - 'retryable flag pattern'
    tasks:
      - 'Catch specific error types with instanceof'
      - 'Implement retry logic for retryable errors'
      - 'Extract contract panic messages from FunctionCallError'
    failure_modes:
      - mistake: 'Catching generic Error instead of NearError subclasses'
        mechanism: 'near-kit throws typed error subclasses. Catching generic Error loses the structured context (panic messages, required/available amounts, retryable flags).'
        wrong_pattern: |
          try { await near.call(...) } catch (e) { console.log(e.message) }
        correct_pattern: |
          import { FunctionCallError, InsufficientBalanceError } from "near-kit"
          try { await near.call(...) } catch (e) {
            if (e instanceof FunctionCallError) console.log(e.panic)
            else if (e instanceof InsufficientBalanceError) console.log(`Need ${e.required}, have ${e.available}`)
          }
        source: 'docs/in-depth/error-handling.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always'
        skills: ['error-handling']
      - mistake: 'Not checking retryable flag before retrying network errors'
        mechanism: 'NetworkError and related errors have a retryable flag. Only retry when this is true. Some network errors are not safe to retry (e.g., malformed requests).'
        wrong_pattern: |
          catch (e) {
            if (e instanceof NetworkError) { await retry() }
          }
        correct_pattern: |
          catch (e) {
            if (e instanceof NetworkError && e.retryable) { await retry() }
          }
        source: 'packages/near-kit/src/errors/index.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['error-handling']

