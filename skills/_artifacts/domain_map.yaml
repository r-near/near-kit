      - 'Initialize Near for testing with Sandbox'
      - 'Configure custom RPC URL and retry behavior'
    failure_modes:
      - mistake: 'Passing raw number instead of unit string'
        mechanism: 'near-kit requires "10 NEAR" not raw numbers. Passing 10 throws because the library cannot determine if you mean 10 NEAR or 10 yoctoNEAR.'
        wrong_pattern: |
          near.send("bob.near", 10)
        correct_pattern: |
          near.send("bob.near", "10 NEAR")
        source: 'docs/start-here/mental-model.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Always enforced — unit strings are a core design principle'
        skills: ['client-setup', 'writing-data', 'transaction-builder']
      - mistake: 'Using near-api-js API patterns instead of near-kit'
        mechanism: 'AI models frequently confuse near-kit with near-api-js. They import from @near-js/accounts, use Account objects, and call parseNearAmount(). near-kit has a flat config, no Account class, and human-readable unit strings.'
        wrong_pattern: |
          import { Account } from "@near-js/accounts"
          import { parseNearAmount } from "@near-js/utils"
          const account = new Account("alice.testnet", provider, signer)
          const amount = parseNearAmount("10.5")
        correct_pattern: |
          import { Near } from "near-kit"
          const near = new Near({ network: "testnet", privateKey: "ed25519:...", defaultSignerId: "alice.testnet" })
          await near.send("bob.near", "10.5 NEAR")
        source: 'docs/reference/ai-integration.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Persistent — AI models are trained on near-api-js and will default to its patterns'
        skills: ['client-setup', 'migration']
      - mistake: 'Not providing any credentials for write operations'
        mechanism: 'View operations (near.view, near.getBalance) work without credentials, but write operations (near.call, near.send, near.transaction) require a signing method. Forgetting to provide privateKey, keyStore, wallet, or signer causes a runtime error when attempting to sign.'
        wrong_pattern: |
          const near = new Near({ network: "testnet" })
          await near.send("bob.near", "1 NEAR") // Error: no signing method configured
        correct_pattern: |
          const near = new Near({
            network: "testnet",
            privateKey: "ed25519:...",
            defaultSignerId: "alice.testnet",
          })
          await near.send("bob.near", "1 NEAR")
        source: 'packages/near-kit/src/core/near.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always enforced'
        skills: ['client-setup']
      - mistake: 'Creating multiple Near instances in browser dev mode'
        mechanism: 'React strict mode double-renders components. If Near is instantiated inline in a render function instead of with useMemo or outside the component, duplicate instances are created, potentially causing nonce collisions or duplicate wallet connections.'
        wrong_pattern: |
          function App() {
            const near = new Near({ network: "testnet", wallet: fromHotConnect(connector) })
          }
        correct_pattern: |
          const near = useMemo(() => new Near({ network: "testnet", wallet: fromHotConnect(connector) }), [connector])
        source: 'packages/react/src/provider.tsx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'React-specific, always relevant'
        skills: ['client-setup', 'react-provider']

  - name: 'Reading Data'
    slug: 'reading-data'
    domain: 'data-access'
    description: 'Query contract view methods, account balances, access keys, and run parallel reads — all free and requiring no credentials'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'near.view<T>()'
      - 'near.getBalance()'
      - 'near.getAccount()'
      - 'near.accountExists()'
      - 'near.getAccessKey() / getAccessKeys()'
      - 'near.getStatus()'
      - 'near.batch()'
      - 'Block references (blockId, finality)'
    tasks:
      - 'Call a contract view method with typed return value'
      - 'Check account balance and available vs total'
      - 'Read from a specific block height or hash'
      - 'Run multiple reads in parallel'
      - 'List access keys for an account'
    failure_modes:
      - mistake: 'Confusing available balance with total balance'
        mechanism: 'getBalance() returns available (spendable) balance, which excludes storage staking. getAccount() returns total liquid balance. Developers expect getBalance to return the full amount.'
        wrong_pattern: |
          const balance = await near.getBalance("alice.near")
          // Assumes this is the TOTAL balance
        correct_pattern: |
          const account = await near.getAccount("alice.near")
          console.log(`Liquid: ${account.balance} NEAR`)
          console.log(`Available: ${account.available} NEAR`)
          console.log(`Staked: ${account.staked} NEAR`)
        source: 'docs/essentials/reading-data.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — NEAR storage staking is non-obvious'
        skills: ['reading-data']
      - mistake: 'Calling near.view without generic type, getting untyped result'
        mechanism: 'near.view() returns any by default. Developers need to pass the generic type parameter for TypeScript safety.'
        wrong_pattern: |
          const messages = await near.view("guestbook.near", "get_messages", { limit: 10 })
        correct_pattern: |
          const messages = await near.view<Message[]>("guestbook.near", "get_messages", { limit: 10 })
        source: 'docs/essentials/reading-data.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['reading-data']
      - mistake: 'Not passing args object when method expects no arguments'
        mechanism: 'Some view methods take no arguments, but near.view still requires the args parameter. Passing an empty object {} works; omitting it may cause issues.'
        wrong_pattern: |
          await near.view("contract.near", "get_count")
        correct_pattern: |
          await near.view("contract.near", "get_count", {})
        source: 'packages/near-kit/src/core/near.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['reading-data']

  - name: 'Writing Data'
    slug: 'writing-data'
    description: 'Send transactions using simple shortcuts — near.send(), near.call() — for common single-action operations'
    domain: 'transactions'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'near.send()'
      - 'near.call()'
      - 'CallOptions (gas, attachedDeposit, signerId, waitUntil)'
      - 'FinalExecutionOutcome inspection'
      - 'Amount helper (Amount.NEAR, Amount.yocto, Amount.ZERO)'
    tasks:
      - 'Send NEAR tokens to another account'
      - 'Call a contract change method with gas and deposit'
      - 'Inspect transaction result for hash, logs, and return values'
      - 'Use dynamic amount calculations with Amount helper'
      - 'Choose waitUntil level for transaction finality'
    failure_modes:
      - mistake: 'Forgetting to attach deposit when contract requires storage payment'
        mechanism: 'Many NEAR contracts require an attached deposit to cover storage costs. If omitted (defaults to 0), the contract call will panic with an error like "ERR_NOT_ENOUGH_BALANCE" or "E_INSUFFICIENT_BALANCE".'
        wrong_pattern: |
          await near.call("token.near", "storage_deposit", {}, { gas: "30 Tgas" })
        correct_pattern: |
          await near.call("token.near", "storage_deposit", {}, { gas: "30 Tgas", attachedDeposit: "0.1 NEAR" })
        source: 'docs/essentials/writing-data.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — contract-specific but very common'
        skills: ['writing-data', 'transaction-builder']
      - mistake: 'Using INCLUDED waitUntil and then reading return value'
        mechanism: 'INCLUDED returns before execution completes, so no return value or logs are available yet. Checking result.status.SuccessValue will be undefined.'
        wrong_pattern: |
          const result = await near.call("contract.near", "method", {}, { waitUntil: "INCLUDED" })
          const value = result.status.SuccessValue // undefined!
        correct_pattern: |
          const result = await near.call("contract.near", "method", {})
          // Default is EXECUTED_OPTIMISTIC — return values available
        source: 'docs/in-depth/advanced-transactions.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['writing-data', 'transaction-builder']
      - mistake: 'Not specifying gas for complex function calls'
        mechanism: 'Gas defaults to 30 Tgas, which is sufficient for simple operations but insufficient for complex contract logic. The call will fail with GasLimitExceededError.'
        wrong_pattern: |
          await near.call("complex-contract.near", "heavy_computation", data)
        correct_pattern: |
          await near.call("complex-contract.near", "heavy_computation", data, { gas: "100 Tgas" })
        source: 'docs/essentials/writing-data.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always — gas limit is contract-dependent'
        skills: ['writing-data', 'transaction-builder']

  - name: 'Transaction Builder'
    slug: 'transaction-builder'
    description: 'Build complex multi-action atomic transactions using the fluent TransactionBuilder — factory patterns, access key management, global contracts, NEP-616 state init'
    domain: 'transactions'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'near.transaction()'
      - 'TransactionBuilder methods: transfer, functionCall, createAccount, deleteAccount, deployContract, stake, addKey, deleteKey'
      - 'publishContract / deployFromPublished (global contracts)'
      - 'stateInit (NEP-616 deterministic accounts)'
      - 'Atomicity guarantee'
      - '.signWith() for per-transaction signer override'
      - 'Nonce management and retry logic'
    tasks:
      - 'Build a factory pattern transaction (create + fund + deploy + init)'
      - 'Add and manage access keys with permissions'
      - 'Deploy global contracts and reference them'
      - 'Override the signer for a specific transaction'
      - 'Handle concurrent transaction nonce conflicts'
    failure_modes:
      - mistake: 'Deploying contract without initializing it in the same transaction'
        mechanism: 'If you deploy a contract in one transaction and initialize it in a separate one, anyone can call init() and take ownership. The factory pattern (deploy + init in one tx) prevents this.'
        wrong_pattern: |
          await near.transaction("alice.near").deployContract("token.alice.near", wasm).send()
          // Anyone can call init() before you!
          await near.call("token.alice.near", "init", { owner: "alice.near" })
        correct_pattern: |
          await near.transaction("alice.near")
            .createAccount("token.alice.near")
            .transfer("token.alice.near", "6 NEAR")
            .deployContract("token.alice.near", wasm)
            .functionCall("token.alice.near", "init", { owner_id: "alice.near" })
            .send()
        source: 'docs/in-depth/advanced-transactions.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Always — security-critical pattern'
        skills: ['transaction-builder']
      - mistake: 'Sending concurrent transactions without RotatingKeyStore'
        mechanism: 'NEAR processes transactions sequentially per access key. Sending multiple concurrent transactions from one key causes InvalidNonceError. The built-in NonceManager retries 3x, but high concurrency needs RotatingKeyStore.'
        wrong_pattern: |
          await Promise.all([
            near.send("a.near", "1 NEAR"),
            near.send("b.near", "1 NEAR"),
            near.send("c.near", "1 NEAR"),
          ])
        correct_pattern: |
          const keyStore = new RotatingKeyStore({
            "bot.near": ["ed25519:key1...", "ed25519:key2...", "ed25519:key3..."],
          })
          const near = new Near({ network: "testnet", keyStore })
          await Promise.all([
            near.send("a.near", "1 NEAR"),
            near.send("b.near", "1 NEAR"),
            near.send("c.near", "1 NEAR"),
          ])
        source: 'docs/in-depth/key-management.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — nonce collisions are the most common concurrency issue'
        skills: ['transaction-builder', 'key-management']
      - mistake: 'Assuming cross-contract calls are rolled back on failure'
        mechanism: 'Atomicity only applies within a single transaction. Cross-contract calls emitted as separate receipts are NOT rolled back if something fails later. Compensating logic must be implemented manually.'
        wrong_pattern: |
          // Assumes all cross-contract effects are atomic
          await near.transaction("alice.near")
            .functionCall("token.near", "transfer", { to: "bob" })
            .send()
          // If bob's receiving contract fails, the transfer is NOT reversed
        correct_pattern: |
          // Within one tx/receipt, it's all-or-nothing
          // Cross-contract receipts need manual compensating logic
        source: 'docs/in-depth/advanced-transactions.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — fundamental NEAR execution model'
        skills: ['transaction-builder']
      - mistake: 'Deleting an account without specifying beneficiary'
        mechanism: 'deleteAccount requires a beneficiary object to receive remaining funds. Passing just the account ID string fails.'
        wrong_pattern: |
          near.transaction("old.alice.near").deleteAccount("alice.near")
        correct_pattern: |
          near.transaction("old.alice.near").deleteAccount({ beneficiary: "alice.near" })
        source: 'docs/in-depth/advanced-transactions.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['transaction-builder']

  - name: 'Type-Safe Contracts'
    slug: 'type-safe-contracts'
    description: 'Define TypeScript interfaces for smart contracts using Contract<T> and get full autocomplete and type checking'
    domain: 'contracts'
    type: 'core'
    packages:
      - 'near-kit'
    covers:
      - 'Contract<T> utility type'
      - 'ContractMethods interface'
      - 'near.contract<T>()'
      - 'View and call method namespaces'
      - 'CallOptions auto-injection on call methods'
    tasks:
      - 'Define a contract interface with view and call methods'
      - 'Create a typed contract proxy'
      - 'Call typed view and change methods'
    failure_modes:
      - mistake: 'Putting change methods in the view namespace or vice versa'
        mechanism: 'Contract<T> separates methods into view (free, read-only) and call (costs gas, changes state). Placing a change method in view will call it as a view function, which either returns wrong data or fails if the method requires a deposit.'
        wrong_pattern: |
          type MyContract = Contract<{
            view: {
              get_balance: (args: { id: string }) => Promise<string>
              set_balance: (args: { id: string, amount: string }) => Promise<void>
            }
            call: {}
          }>
        correct_pattern: |
          type MyContract = Contract<{
            view: {
              get_balance: (args: { id: string }) => Promise<string>
            }
            call: {
              set_balance: (args: { id: string, amount: string }) => Promise<void>
            }
          }>
        source: 'docs/essentials/type-safe-contracts.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always'
        skills: ['type-safe-contracts']
      - mistake: 'Adding CallOptions parameter to call method type definition'
        mechanism: 'Contract<T> automatically adds the options parameter (gas, attachedDeposit) to call methods. Defining it manually in the type causes a double-options signature.'
        wrong_pattern: |
          call: {
            transfer: (args: { to: string }, options?: CallOptions) => Promise<void>
          }
        correct_pattern: |
          call: {
            transfer: (args: { to: string }) => Promise<void>
          }
        source: 'packages/near-kit/src/contracts/contract.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always — auto-injection is a design feature'
        skills: ['type-safe-contracts']

