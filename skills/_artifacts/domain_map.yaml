    tasks:
      - 'Start and configure Sandbox for tests'
      - 'Patch blockchain state without transactions'
      - 'Fast-forward blocks for time-dependent logic'
      - 'Save and restore state snapshots'
      - 'Restart Sandbox with clean state'
    failure_modes:
      - mistake: 'Not increasing test timeout for Sandbox startup'
        mechanism: 'Sandbox.start() downloads a binary and starts a local node, which can take 30-60 seconds. Default test timeouts (5-10s) are insufficient.'
        wrong_pattern: |
          beforeAll(async () => { sandbox = await Sandbox.start() })
        correct_pattern: |
          beforeAll(async () => { sandbox = await Sandbox.start() }, 60000)
        source: 'CLAUDE.md testing section'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — Sandbox binary download is slow on first run'
        skills: ['testing']
      - mistake: 'Using duplicate account names across tests'
        mechanism: 'NEAR account IDs must be unique. If tests create accounts with the same name, they collide. Use timestamp-based names for isolation.'
        wrong_pattern: |
          const account = `test.${sandbox.rootAccount.id}`
        correct_pattern: |
          const account = `test-${Date.now()}.${sandbox.rootAccount.id}`
        source: 'CLAUDE.md testing section'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['testing']

  - name: 'Migration from near-api-js'
    slug: 'migration'
    description: 'Migrate from near-api-js to near-kit — side-by-side comparisons of connecting, units, contracts, error handling, and access keys'
    domain: 'client-setup'
    type: 'lifecycle'
    packages:
      - 'near-kit'
    covers:
      - 'No Account object — use Near directly'
      - 'String units instead of BigInt/parseNearAmount'
      - 'Fluent builder instead of config objects'
      - 'Typed error subclasses instead of TypedError string matching'
      - 'Flat config instead of assembled components'
    tasks:
      - 'Replace near-api-js Account pattern with Near instance'
      - 'Replace parseNearAmount with unit strings'
      - 'Replace callFunction config objects with fluent chain'
      - 'Replace error type string matching with instanceof checks'
    failure_modes:
      - mistake: 'Trying to use Account class from near-api-js'
        mechanism: 'near-kit does not have an Account class. All operations go through the Near client. The signer is determined by config (privateKey, keyStore, wallet) or per-transaction (signWith, signerId).'
        wrong_pattern: |
          const account = new Account("alice.testnet", provider, signer)
          await account.sendMoney("bob.testnet", parseNearAmount("10"))
        correct_pattern: |
          const near = new Near({ network: "testnet", privateKey: "ed25519:...", defaultSignerId: "alice.testnet" })
          await near.send("bob.testnet", "10 NEAR")
        source: 'docs/start-here/migration.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Always — fundamental API difference'
        skills: ['migration', 'client-setup']
      - mistake: 'Using parseNearAmount or formatNearAmount from near-api-js'
        mechanism: 'near-kit handles unit conversion automatically with string inputs. There is no need for parseNearAmount or formatNearAmount. Use "10.5 NEAR" directly.'
        wrong_pattern: |
          import { parseNearAmount } from "@near-js/utils"
          const amount = parseNearAmount("10.5")
        correct_pattern: |
          const amount = "10.5 NEAR"
        source: 'docs/start-here/migration.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Always'
        skills: ['migration', 'writing-data', 'transaction-builder']

  - name: 'React Provider'
    slug: 'react-provider'
    description: 'Set up NearProvider in React and Next.js apps — configure Near client, handle SSR, and integrate wallets'
    domain: 'react'
    type: 'framework'
    packages:
      - '@near-kit/react'
    requires:
      - 'client-setup'
    covers:
      - 'NearProvider component'
      - 'useNear() hook'
      - 'Next.js App Router setup'
      - 'Next.js Pages Router setup'
      - 'Wallet-connected provider pattern'
      - 'Nested provider error'
    tasks:
      - 'Wrap app with NearProvider and a Near config'
      - 'Set up NearProvider for Next.js App Router'
      - 'Handle dynamic wallet connection with NearProvider'
      - 'Access the Near client with useNear()'
    failure_modes:
      - mistake: 'Using NearProvider in Server Components'
        mechanism: '@near-kit/react is marked "use client" and only works in client components. Using it in Next.js Server Components causes a runtime error.'
        wrong_pattern: |
          // app/layout.tsx (Server Component)
          import { NearProvider } from "@near-kit/react"
          export default function Layout({ children }) {
            return <NearProvider config={...}>{children}</NearProvider>
          }
        correct_pattern: |
          // app/providers.tsx
          "use client"
          import { NearProvider } from "@near-kit/react"
          export function Providers({ children }) {
            return <NearProvider config={...}>{children}</NearProvider>
          }
        source: 'packages/react/README.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Always — Next.js App Router requirement'
        skills: ['react-provider']
      - mistake: 'Nesting NearProvider components'
        mechanism: 'NearProvider throws if nested inside another NearProvider. Use a single provider at the root.'
        wrong_pattern: |
          <NearProvider config={config1}>
            <NearProvider config={config2}> {/* Error! */}
        correct_pattern: |
          <NearProvider config={config1}>
            {/* Single provider, access via useNear() */}
        source: 'packages/react/src/provider.tsx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Always'
        skills: ['react-provider']

  - name: 'React Hooks'
    slug: 'react-hooks'
    description: 'Use view, mutation, and account hooks in React components — useView, useCall, useSend, useBalance, useAccount, useContract'
    domain: 'react'
    type: 'framework'
    packages:
      - '@near-kit/react'
    requires:
      - 'react-provider'
    covers:
      - 'useView<TArgs, TResult>()'
      - 'useBalance()'
      - 'useAccountExists()'
      - 'useCall<TArgs, TResult>()'
      - 'useSend()'
      - 'useAccount()'
      - 'useContract<T>()'
      - 'React Query integration'
      - 'SWR integration'
    tasks:
      - 'Read contract data with useView'
      - 'Call change methods with useCall'
      - 'Send NEAR with useSend'
      - 'Check connected account with useAccount'
      - 'Integrate with React Query for caching'
    failure_modes:
      - mistake: 'Using refetch() immediately after mutation for data refresh'
        mechanism: "Built-in hooks don't auto-invalidate after mutations. Calling refetch() immediately after mutate() can use stale parameters. React Query's invalidateQueries is the correct approach."
        wrong_pattern: |
          const { mutate } = useCall({ contractId: "counter", method: "increment" })
          const { refetch } = useView({ contractId: "counter", method: "get_count" })
          await mutate({})
          await refetch() // May use stale params
        correct_pattern: |
          // Use React Query with invalidateQueries
          const queryClient = useQueryClient()
          const { mutate } = useMutation({
            mutationFn: (args) => near.call("counter", "increment", args),
            onSuccess: () => queryClient.invalidateQueries({ queryKey: ["near", "view", "counter"] })
          })
        source: 'docs/react/data-fetching.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — built-in hooks are intentionally simple'
        skills: ['react-hooks']
      - mistake: 'Creating object args inline causing infinite re-renders'
        mechanism: 'useView depends on args for refetching. If args is an object literal, it creates a new reference every render, triggering infinite re-fetches. Use useMemo or extract to a stable reference.'
        wrong_pattern: |
          const { data } = useView({ contractId: "token", method: "ft_balance_of", args: { account_id: accountId } })
        correct_pattern: |
          const args = useMemo(() => ({ account_id: accountId }), [accountId])
          const { data } = useView({ contractId: "token", method: "ft_balance_of", args })
        source: 'docs/react/hooks.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Always — JavaScript object identity issue'
        skills: ['react-hooks']

tensions:
  - name: 'Getting-started simplicity vs production operational safety'
    skills: ['client-setup', 'key-management']
    description: 'Simple privateKey config is easy for scripts but insecure for production; production needs FileKeyStore or NativeKeyStore but has more setup complexity'
    implication: 'Agents will default to the simplest config (privateKey in code) even for production deployments, exposing secrets'
  - name: 'Built-in hook simplicity vs production data-fetching needs'
    skills: ['react-hooks', 'react-provider']
    description: 'Built-in React hooks are intentionally minimal but lack caching, deduplication, and optimistic updates needed in production'
    implication: 'Agents will use the built-in hooks for production apps instead of integrating React Query or SWR, leading to poor UX'
  - name: 'Concurrent transaction throughput vs single-key simplicity'
    skills: ['transaction-builder', 'key-management']
    description: 'A single access key is simplest to configure but bottlenecks concurrent transactions; RotatingKeyStore solves it but requires provisioning multiple keys'
    implication: 'Agents will send concurrent transactions with a single key and be surprised by InvalidNonceErrors'

